<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="omnisBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6aa5ee"/>
      <stop offset="55%" stop-color="#5597e6"/>
      <stop offset="100%" stop-color="#34619e"/>
    </linearGradient>
    <linearGradient id="omnisSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Boite GLF (carre arrondi) -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#omnisBox)"/>
  <!-- brillance haute -->
  <rect x="24" y="24" width="464" height="232" rx="108" fill="url(#omnisSheen)"/>

  <!-- Glyphe installeur : fleche descendante vers un receptacle (installer sur le disque) -->
  <g fill="#ffffff">
    <!-- hampe de la fleche -->
    <rect x="226" y="118" width="60" height="150" rx="14"/>
    <!-- tete de la fleche -->
    <path d="M 160 236 L 352 236 L 256 350 Z"/>
  </g>
  <!-- receptacle / disque cible (bac ouvert) -->
  <path d="M 150 320 L 150 392 L 362 392 L 362 320"
        fill="none" stroke="#ffffff" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
