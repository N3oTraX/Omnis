# git-cliff — changelog depuis les Conventional Commits.
[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Fonctionnalités" },
  { message = "^fix", group = "Corrections" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactorisation" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^style", group = "Style" },
  { message = "^ci|^build", group = "CI/Build" },
  { message = "^chore", group = "Divers" },
  { message = ".*", group = "Divers" },
]
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
