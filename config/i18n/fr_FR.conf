# =============================================================================
# Omnis Installer - Traduction Française (FR)
# =============================================================================
# Fichier: fr_FR.conf
# Encodage: UTF-8
#
# Format: Style INI avec sections pour chaque zone de l'interface
# Les variables utilisent la syntaxe {nom_variable} pour l'interpolation
# =============================================================================

# -----------------------------------------------------------------------------
# Chaînes communes utilisées dans tout l'installeur
# -----------------------------------------------------------------------------
[common]
app_name = Installeur Omnis
continue = Continuer
back = Retour
cancel = Annuler
next = Suivant
finish = Terminer
yes = Oui
no = Non
ok = OK
close = Fermer
error = Erreur
warning = Avertissement
info = Information
success = Succès
loading = Chargement...
please_wait = Veuillez patienter...
powered_by = Propulsé par {app_name}

# -----------------------------------------------------------------------------
# Écran d'accueil
# -----------------------------------------------------------------------------
[welcome]
title = Bienvenue sur {distro_name}
subtitle = {distro_tagline}
install_button = Installer {distro_name}
release_notes = Notes de version
checking_requirements = Vérification de la configuration requise...
requirements_passed = Votre système répond à toutes les exigences
requirements_warnings = Certaines recommandations ne sont pas respectées
requirements_failed = Configuration requise non satisfaite

# -----------------------------------------------------------------------------
# Configuration requise
# -----------------------------------------------------------------------------
[requirements]
title = Configuration Requise
subtitle = Vérification du matériel et de la compatibilité système

# Mémoire
ram_name = Mémoire (RAM)
ram_description = Mémoire système disponible
ram_pass = RAM suffisante pour un fonctionnement optimal
ram_warn = RAM minimale atteinte, quantité recommandée non atteinte
ram_fail = RAM insuffisante pour l'installation
ram_current = {value} Go disponibles
ram_required = Minimum : {min} Go
ram_recommended = Recommandé : {recommended} Go

# Espace disque
disk_name = Espace de Stockage
disk_description = Espace disque disponible pour l'installation
disk_pass = Espace de stockage suffisant
disk_warn = Espace minimum disponible, plus recommandé
disk_fail = Espace de stockage insuffisant
disk_current = {value} Go disponibles
disk_required = Minimum : {min} Go
disk_recommended = SSD recommandé pour de meilleures performances

# Architecture CPU
cpu_name = Processeur
cpu_description = Compatibilité de l'architecture CPU
cpu_pass = Processeur 64 bits compatible détecté
cpu_warn = Architecture non standard détectée
cpu_fail = Architecture processeur incompatible
cpu_current = Architecture {arch}

# Mode de démarrage
efi_name = Mode de Démarrage
efi_description = Type de firmware système
efi_pass = Mode de démarrage UEFI détecté
efi_warn = Mode BIOS Legacy (UEFI recommandé)
efi_fail = UEFI requis pour l'installation
efi_current_uefi = UEFI
efi_current_bios = BIOS Legacy

# Secure Boot
secure_boot_name = Secure Boot
secure_boot_description = État du firmware Secure Boot
secure_boot_pass = Secure Boot est désactivé
secure_boot_warn = Secure Boot activé (peut nécessiter d'être désactivé pour certains pilotes)
secure_boot_fail = Secure Boot doit être désactivé
secure_boot_enabled = Activé
secure_boot_disabled = Désactivé

# Internet
internet_name = Connexion Internet
internet_description = État de la connectivité réseau
internet_pass = Connexion Internet disponible
internet_warn = Pas de connexion Internet (recommandée pour les mises à jour)
internet_fail = Connexion Internet requise
internet_connected = Connecté
internet_disconnected = Non connecté

# Alimentation
power_name = Source d'Alimentation
power_description = État de l'alimentation système
power_pass = Fonctionne sur secteur
power_warn = Fonctionne sur batterie (alimentation secteur recommandée)
power_fail = Alimentation secteur requise pour l'installation
power_ac = Secteur
power_battery = Batterie
power_desktop = Secteur (Ordinateur de bureau)

# Batterie
battery_name = Niveau de Batterie
battery_description = Niveau de charge actuel de la batterie
battery_pass = Charge de batterie suffisante
battery_warn = Batterie faible, connexion secteur recommandée
battery_fail = Batterie trop faible pour une installation sûre
battery_current = {percent}% de charge
battery_required = Minimum : {min}%

# GPU
gpu_name = Carte Graphique (GPU)
gpu_description = Compatibilité de la carte graphique
gpu_pass = GPU dédié compatible détecté
gpu_warn = Graphiques intégrés uniquement (GPU dédié recommandé pour le gaming)
gpu_fail = Carte graphique non compatible ou non détectée
gpu_current = {gpus}
gpu_recommended = GPU dédié (NVIDIA/AMD) recommandé

# Messages GPU détaillés
gpu_dedicated_found = GPU dédié : {gpu}
gpu_integrated_only = Graphiques intégrés uniquement
gpu_nvidia_below_min = GPU NVIDIA en dessous de l'exigence minimale ({min_model})
gpu_amd_below_min = GPU AMD en dessous de l'exigence minimale ({min_model})
gpu_intel_below_min = GPU Intel en dessous de l'exigence minimale ({min_model})
gpu_not_supported = Fabricant GPU non pris en charge
gpu_none_detected = Aucun GPU compatible détecté

# Popup d'exigences (bloquant)
popup_title = Impossible de Continuer l'Installation
popup_message = Votre système ne répond pas aux exigences minimales pour {distro_name}.
popup_details = Veuillez consulter les exigences non satisfaites ci-dessous et vous assurer que votre système répond aux spécifications minimales.
popup_close = Fermer l'Installeur

# -----------------------------------------------------------------------------
# Sélection de la langue
# -----------------------------------------------------------------------------
[locale]
title = Langue et Région
subtitle = Sélectionnez votre langue et votre emplacement préférés
language = Langue
region = Région
timezone = Fuseau horaire
keyboard = Disposition du clavier
keyboard_preview = Aperçu du clavier
detect_layout = Détecter la disposition

# -----------------------------------------------------------------------------
# Partitionnement
# -----------------------------------------------------------------------------
[partition]
title = Partitionnement du Disque
subtitle = Choisissez comment installer {distro_name}
erase_disk = Effacer le disque et installer {distro_name}
erase_disk_desc = Cela supprimera toutes les données sur le disque sélectionné
alongside = Installer à côté d'autres systèmes d'exploitation
alongside_desc = Choisissez l'espace à allouer
manual = Partitionnement manuel
manual_desc = Créer et gérer les partitions manuellement
encrypt = Chiffrer l'installation
encrypt_desc = Sécurisez vos données avec un chiffrement complet du disque
select_disk = Sélectionner le disque d'installation
disk_info = {size} Go - {model}

# -----------------------------------------------------------------------------
# Sélection des paquets
# -----------------------------------------------------------------------------
[packages]
title = Environnement de Bureau
subtitle = Choisissez votre expérience de bureau préférée
flavors_title = Éditions Disponibles
optional_title = Composants Optionnels
gaming = Gaming
gaming_desc = Steam, Lutris, Wine, Proton-GE, MangoHud
streaming = Streaming
streaming_desc = OBS Studio, plugins de streaming
emulation = Émulation
emulation_desc = RetroArch, Dolphin, PCSX2, RPCS3

# -----------------------------------------------------------------------------
# Configuration utilisateur
# -----------------------------------------------------------------------------
[users]
title = Compte Utilisateur
subtitle = Créez votre compte utilisateur
fullname = Nom complet
username = Nom d'utilisateur
password = Mot de passe
confirm_password = Confirmer le mot de passe
hostname = Nom de l'ordinateur
auto_login = Se connecter automatiquement
require_password = Demander un mot de passe pour se connecter
root_password = Définir le mot de passe administrateur
passwords_match = Les mots de passe correspondent
passwords_mismatch = Les mots de passe ne correspondent pas
username_invalid = Format de nom d'utilisateur invalide
hostname_invalid = Format de nom d'ordinateur invalide

# -----------------------------------------------------------------------------
# Progression de l'installation
# -----------------------------------------------------------------------------
[install]
title = Installation de {distro_name}
subtitle = Veuillez patienter pendant l'installation du système
step_partitioning = Partitionnement du disque...
step_copying = Copie des fichiers système...
step_configuring = Configuration du système...
step_bootloader = Installation du chargeur de démarrage...
step_users = Création des comptes utilisateurs...
step_finishing = Finalisation de l'installation...
progress = {percent}% terminé
time_remaining = Temps restant estimé : {time}

# -----------------------------------------------------------------------------
# Installation terminée
# -----------------------------------------------------------------------------
[finished]
title = Installation Terminée !
subtitle = {distro_name} a été installé avec succès
message = Vous pouvez maintenant redémarrer votre ordinateur pour commencer à utiliser {distro_name}.
reboot_now = Redémarrer Maintenant
reboot_later = Redémarrer Plus Tard
view_log = Voir le Journal d'Installation
auto_reboot = Redémarrage automatique dans {seconds} secondes...

# -----------------------------------------------------------------------------
# Erreurs
# -----------------------------------------------------------------------------
[errors]
generic = Une erreur s'est produite
disk_space = Espace disque insuffisant
network = Connexion réseau requise
partition_failed = Le partitionnement du disque a échoué
install_failed = L'installation a échoué
bootloader_failed = L'installation du chargeur de démarrage a échoué
user_creation_failed = La création du compte utilisateur a échoué
unknown = Une erreur inconnue s'est produite
retry = Réessayer
report_bug = Signaler un Bug
